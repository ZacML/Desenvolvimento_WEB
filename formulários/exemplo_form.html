<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="../css/style.css">

</head>
<body>
    <h1 style="color: blueviolet; font-size: 16px;">Formulário de Cadastro</h1>
    <hr style="border-color: rgb(0, 189, 0);">

    <form action="#" method="post" enctype="multipart/form-data">
        <label for="upload">Arquivo(s)</label> <br>
        <input type="file" name="upload" id="upload" accept=".pdf" multiple>
    </form>
    <hr>
    <div class="alerta"></div>
    <div class="aviso"></div>
    <div class="corre"></div>
    <a href="#">Bazinga</a>
    <hr>
    <form action="#" method="get">
        <div>
            <label for="txtNome">Nome</label>
            <input type="text" name="txtNome" id="txtNome" placeholder="Digite o seu nome">
        </div>
        <div>
            <label for="txtSenha">Senha</label>
            <input type="password" name="txtSenha" id="txtSenha">
        </div>
        <hr>
        <div>
            <label for="rdTurno">Turno</label><br>
            <input type="radio" name="rdTurno" id="rdTurnoMat" value="M">Matutino <br>
            <input type="radio" name="rdTurno" id="rdTurnoVesp" value="V">Verspertino <br>
            <input type="radio" name="rdTurno" id="rdTurnoNot" value="N" checked>Noturno <br>
        </div>
        <hr>
        <div>
            <label for="ckDiaSemana">Dias da Semana</label><br>
            <input type="checkbox" name="ckDiaSemana" id="ckDom" value="DOM" checked disabled>Domingo <br>
            <input type="checkbox" name="ckDiaSemana" id="ckSeg" value="SEG">Segunda-feira <br>
            <input type="checkbox" name="ckDiaSemana" id="ckTer" value="TER">Terça-feira <br>
            <input type="checkbox" name="ckDiaSemana" id="ckQua" value="QUA">Quarta-feira <br>
            <input type="checkbox" name="ckDiaSemana" id="ckQui" value="QUI">Quinta-feira <br>
            <input type="checkbox" name="ckDiaSemana" id="ckSex" value="SEX">Sexta-feira <br>
            <input type="checkbox" name="ckDiaSemana" id="ckSab" value="SAB" checked disabled>Sábado <br>
        </div>
        <hr>
        <div>
            <label for="dtNasc">Data de Nascimento</label>
            <input type="date" name="dtNasc" id="dtNasc">
        </div>
        <hr>
        <div>
            <label for="nrIdade">Idade</label>
            <input required type="number" name="nrIdade" id="nrIdade" min="12" max="100">
        </div>
        <hr>
        <div>
            <label for="txtEmail">E-mail</label>
            <input required type="email" name="txtEmail" id="txtEmail" placeholder="Digite o seu e-mail">
        </div>
        <hr>
        <div>
            <label for="txtCPF">CPF</label>
            <input required type="number" pattern="\d{3}\.\d{3}\.\d{3}\-\d{2}" placeholder="000.000.000-00" id="txtCPF">
        </div>
        <hr>
        <div>
            <input type="range" name="rgPinto" id="pinto" min="0" max="100" step="10">
        </div>
        <hr>
        <div>
            <label for="clrCor">Cor</label>
            <input type="color" name="clrCor" id="clrCor" value="#3355FF">
        </div>
        <hr>
        <div>
            <label for="cidades">Escolha uma cidade:</label><br>
            <select name="cidades" id="cidades">
                <option value="SP">Laguna</option>
                <option value="RJ">Gravatal</option>
                <option value="MG">Braço do Norte</option>
                <option value="SC" selected>Tubarão</option>
            </select>
        </div>
        <hr>
        <div>
            <textarea name="areaTexto" id="areaTexto" placeholder="Digite sua mensagem aqui..."></textarea>
        </div>
        <div>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>
</body>
</html>

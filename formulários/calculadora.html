<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

    <link rel="stylesheet" href="../css/styleCalculadora.css">
    <script src="../scripts/meu_javascript.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body>

    <div class="calculator-card">
        <h3 class="text-center mb-4 text-primary">Minha Calculadora</h3>

        <div class="mb-3">
            <label for="n1" class="form-label">Primeiro número:</label>
            <input type="number" class="form-control form-control-lg" id="n1" placeholder="Ex: 10">
        </div>

        <div class="mb-3">
            <label for="n2" class="form-label">Segundo número:</label>
            <input type="number" class="form-control form-control-lg" id="n2" placeholder="Ex: 5">
        </div>

        <div class="operators-container">
            <button class="btn btn-outline-primary op-btn" type="button" title="Somar" onclick="calcular('+')">+</button>
            <button class="btn btn-outline-primary op-btn" type="button" title="Subtrair" onclick="calcular('-')">-</button>
            <button class="btn btn-outline-primary op-btn" type="button" title="Multiplicar" onclick="calcular('*')">*</button>
            <button class="btn btn-outline-primary op-btn" type="button" title="Dividir" onclick="calcular('/')">/</button>
        </div>

        <button class="btn btn-primary btn-lg w-100" type="button" id="btn-calcular">Calcular</button>

        <hr class="my-4">

        <div class="mb-2">
            <label for="resultado" class="form-label">Resultado:</label>
            <input type="text" class="form-control text-center" id="resultado" placeholder="0" readonly>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

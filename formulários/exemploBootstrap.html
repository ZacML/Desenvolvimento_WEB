<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</head>
<body style="background-image: url(../imagens/1000_F_258698167_rPausS45PIUX71fDDXEYOHAO2WgGrhcZ.jpg);">
    <br>
    <div style="background-color: white; padding: 30px; max-width: 800px;" class="container mt-5 mb-5 shadow-lg rounded-4">
        <label class="fs-4 fw-bold">Cadastro de Produto</label>
        <br>

        <div class="row mb-2 mt-2">
                <label for="formFile" class="form-label">Foto do Produto:</label>
                <input class="form-control" type="file" id="formFile">
        </div>

        <div class="row mb-2 mt-2">
            <div class="col-12 col-md-6 col-lg-6">
                <label class="mb-0 text-nowrap">Nome do produto:</label>
                <input class="form-control form-control-sm" type="text" placeholder="X-Salada" aria-label=".form-control-sm example">    
            </div>

            <div class="col-12 col-md-6 col-lg-6">
                <label class="mb-0 text-nowrap">Código:</label>
                <input class="form-control form-control-sm" type="text" placeholder="Código" aria-label="Código">
            </div>
        </div>

        <div class="row mb-2 mt-2">
            <div class="col">
                <label class="mb-0 text-nowrap">Valor de Custo:</label>
                <input class="form-control form-control-sm" type="text" placeholder="R$ 10,00" aria-label="Valor">
            </div>
            <div class="col">
                <label class="mb-0 text-nowrap">Valor de Venda:</label>
                <input class="form-control form-control-sm" type="text" placeholder="R$ 10,00" aria-label="Valor">
            </div>
        </div>

        <div class="row mb-2 mt-2">
            <div class="col">
                <label class="mb-0 text-nowrap">Categoria:</label>
                <select class="form-select" aria-label="Default select example">
                    <option selected>Selecione a categoria do seu produto:</option>
                    <option value="1">Hamburgueres</option>
                    <option value="2">Lanches</option>
                    <option value="3">Bebidas</option>
                </select>
            </div>
        </div>

        <div class="row mb-2 mt-2">
            <div class="col">
                <label class="mb-0 text-nowrap">Tempo de preparo:</label>
                <input type="range" class="form-range" min="0" max="60" step="5" id="range5">
                <output for="range5" id="rangeValue" aria-hidden="true"></output>
                <script>
                    // This is an example script, please modify as needed
                    const rangeInput = document.getElementById('range5');
                    const rangeOutput = document.getElementById('rangeValue');

                    // Set initial value
                    rangeOutput.textContent = rangeInput.value;

                    rangeInput.addEventListener('input', function() {
                    rangeOutput.textContent = this.value;
                    });
                </script>
            </div>
        </div>

        <div class="row mb-2 mt-2">
            <div class="col">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                    <label class="form-check-label" for="checkDefault">
                    Disponivel para Delivery
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                    <label class="form-check-label" for="checkDefault">
                    Opção Vegetariana/Vegana
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                    <label class="form-check-label" for="checkDefault">
                    Produto em Destaque
                    </label>
                </div>

            </divc>
        </div>

        <div class="row mb-2 mt-2">
            <div class="col">
                <label for="exampleFormControlTextarea1" class="form-label">Descrição:</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
            </div>
        </div>

        <div class="row mb-2 mt-3">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" role="switch" id="switchCheckChecked" checked>
                <label class="form-check-label" for="switchCheckChecked">Ativo/Inativo</label>
            </div>
        </div>
    <a href="../formulários/finalizado.html"><input class="btn btn-primary" type="submit" value="Enviar"></a>
    </div>
</body>
</html>

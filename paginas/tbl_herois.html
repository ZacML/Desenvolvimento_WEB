<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Exemplo tabela</title>

        </tr>
        <tr>
            <td>DC</td>

        </tr>

                    <tr>
                        <td>.</td>

                        <td>.</td>
                    </tr>
                    <tr>
                        <td>.</td>

                        <td>.</td>
                        <td>.</td>
                    </tr>
                    <tr>
                        <td>.</td>
                        <td>.</td>

                        <td>.</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
